name: Apply mobile footer centering

on:
  push:
    branches:
      - Combined
    paths:
      - .github/workflows/apply-mobile-footer-centering.yml

permissions:
  contents: write

jobs:
  update-footer-styles:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Combined
        uses: actions/checkout@v4
        with:
          ref: Combined

      - name: Apply shared mobile footer styles
        run: |
          python - <<'PY'
          from pathlib import Path

          styles_path = Path('public/styles.css')
          styles = styles_path.read_text(encoding='utf-8')
          marker = '/* Global mobile footer centering */'
          block = '''\n\n/* Global mobile footer centering */\n@media (max-width: 700px) {\n  .footer-inner {\n    text-align: center;\n  }\n\n  .footer-column,\n  .footer-links,\n  .footer-contact,\n  .footer-social,\n  .footer-brand {\n    align-items: center;\n    text-align: center;\n  }\n\n  .footer-contact-item {\n    width: auto;\n    justify-content: center;\n    text-align: left;\n  }\n\n  .footer-social-links {\n    justify-content: center;\n  }\n\n  .footer-social .button,\n  .site-footer .footer-social .button {\n    width: 100%;\n    max-width: 330px;\n  }\n}\n'''
          if marker not in styles:
              styles_path.write_text(styles.rstrip() + block, encoding='utf-8')

          about_path = Path('public/about.html')
          about = about_path.read_text(encoding='utf-8')
          about = about.replace('      .footer-social-links { width:auto; }\n', '')
          about_path.write_text(about, encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-mobile-footer-centering.yml

      - name: Commit shared footer update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/styles.css public/about.html .github/workflows/apply-mobile-footer-centering.yml
          git commit -m "Center footer across mobile pages"
          git push origin Combined
